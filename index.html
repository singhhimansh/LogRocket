<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <!-- <link rel="favicon" href="favicon.ico"> -->
</head>

<body>
  <h1>Hello World</h1>
  <input type="text" id="testInput" />
  <input type="text" id="testInput2" class="mask-field" />
  <p id="output"></p>
  <p id="output2"></p>
  <button id="testButton2">Add identifer No</button>
  <button id="play">Session Replay</button>
  <div id="testDiv"></div>

  <iframe id="sdk_player" style="
       border:2px solid rgb(189, 78, 10);
       border-radius: 8px;
    
        width:100%;
        height:400px;
      ">
  </iframe>

  <script>

    document.getElementById("testInput").addEventListener("input", (e) => {
      document.getElementById("output").textContent = e.target.value;
    });

    document.getElementById("testInput2").addEventListener("input", (e) => {
      document.getElementById("output2").textContent = e.target.value;
    });

    Array.from({ length: 5 }, (_, i) => {
      document
        .getElementById("testDiv")
        .appendChild(document.createElement("p")).textContent =
        `Test Div${i + 1}`;
    });
  </script>
  <script type="module">
    import AnalyticsInit from "./packages/core-analytics/index.js";
    import { SessionPlayer } from "./packages/session-replay/class/SessionPlayer.js";
    const analytics = new AnalyticsInit({
      disableScrollTracking: true,
      sessionReplay: true,
    });
    const instance = await analytics.init();
    console.log("instance", instance);

    document
      .getElementById("testButton2")
      .addEventListener("click", async () => {
        instance.identity(9084618246);
      });

    document.getElementById("play").addEventListener("click", async () => {
      const page = await instance.eventsRepository.getByTime({ limit: 10000 });
      const player = new SessionPlayer(page.items, "sdk_player");
      await player.play();
    });
  </script>
</body>

</html>
